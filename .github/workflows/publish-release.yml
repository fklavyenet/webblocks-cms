name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      PRODUCT_KEY: webblocks-cms
      DEFAULT_CHANNEL: stable
      SOURCE_TYPE: github
      MINIMUM_CLIENT_VERSION: 0.1.8

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate publish token
        env:
          WEBBLOCKS_PUBLISH_TOKEN: ${{ secrets.WEBBLOCKS_PUBLISH_TOKEN }}
        run: |
          if [ -z "$WEBBLOCKS_PUBLISH_TOKEN" ]; then
            printf 'WEBBLOCKS_PUBLISH_TOKEN is required.\n' >&2
            exit 1
          fi

      - name: Resolve publisher URL
        id: publish-url
        env:
          WEBBLOCKS_PUBLISH_URL: ${{ secrets.WEBBLOCKS_PUBLISH_URL }}
        run: |
          publish_url="$WEBBLOCKS_PUBLISH_URL"

          if [ -z "$publish_url" ]; then
            publish_url='https://updates.webblocksui.com/api/updates/publish'
          fi

          printf 'value=%s\n' "$publish_url" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: release
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          version="${TAG_NAME#v}"

          if [ "$version" = "$TAG_NAME" ] || [ -z "$version" ]; then
            printf 'Tag %s does not start with v.\n' "$TAG_NAME" >&2
            exit 1
          fi

          release_url="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/webblocks-cms-${version}.zip"
          release_time="$(git for-each-ref --format='%(creatordate:iso8601-strict)' "refs/tags/${TAG_NAME}")"

          if [ -z "$release_time" ]; then
            printf 'Failed to resolve release time for tag %s.\n' "$TAG_NAME" >&2
            exit 1
          fi

          printf 'tag=%s\n' "$TAG_NAME" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'release_url=%s\n' "$release_url" >> "$GITHUB_OUTPUT"
          printf 'released_at=%s\n' "$release_time" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: scripts/release-notes.sh "${{ steps.release.outputs.tag }}" release-notes.md

      - name: Build release archive
        run: scripts/build-release.sh "${{ steps.release.outputs.version }}" dist

      - name: Capture archive checksum
        id: checksum
        run: |
          archive_path="dist/webblocks-cms-${{ steps.release.outputs.version }}.zip"
          checksum="$(cut -d' ' -f1 "${archive_path}.sha256")"

          if [ -z "$checksum" ]; then
            printf 'Failed to read archive checksum.\n' >&2
            exit 1
          fi

          printf 'value=%s\n' "$checksum" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          archive_path="dist/webblocks-cms-${{ steps.release.outputs.version }}.zip"
          checksum_path="${archive_path}.sha256"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive_path" "$checksum_path" --clobber
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" \
              "$archive_path" \
              "$checksum_path" \
              --title "$tag" \
              --notes-file release-notes.md
          fi

      - name: Publish release package to WebBlocks Publisher
        env:
          WEBBLOCKS_PUBLISH_TOKEN: ${{ secrets.WEBBLOCKS_PUBLISH_TOKEN }}
          PUBLISH_URL: ${{ steps.publish-url.outputs.value }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          CHECKSUM: ${{ steps.checksum.outputs.value }}
        run: |
          archive_path="dist/webblocks-cms-${VERSION}.zip"

          if [ ! -f "$archive_path" ]; then
            printf 'Archive %s not found.\n' "$archive_path" >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            --url "$PUBLISH_URL" \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${WEBBLOCKS_PUBLISH_TOKEN}" \
            --form "product=${PRODUCT_KEY}" \
            --form "version=${VERSION}" \
            --form "channel=${DEFAULT_CHANNEL}" \
            --form "minimum_client_version=${MINIMUM_CLIENT_VERSION}" \
            --form "release_notes=<release-notes.md" \
            --form "notes=GitHub release package publish for ${TAG_NAME}" \
            --form "source_reference=${TAG_NAME}" \
            --form "checksum_sha256=${CHECKSUM}" \
            --form "package=@${archive_path};type=application/zip"
